  <link rel="manifest" href="manifest.json">

<body>
  <header>
    <h1>타로 리딩</h1>
    <p class="tag">오늘의 카드로 읽는 이야기 · 사주와 함께</p>
    <div class="fomo" id="fomo">오늘 드로우 1회</div>
  </header>

  <main>
    <section>
      <h2>스프레드 선택</h2>
      <button onclick="drawTarot(1)">1장 (오늘의 카드)</button>
      <button onclick="drawTarot(3)">3장 (과거·현재·미래)</button>
      <button onclick="drawTarot(10)">10장 (켈틱 크로스)</button>
      <div style="margin-top:8px">
        <label><input type="checkbox" id="p20boost"> 사주 흐름 함께 읽기</label>
      </div>
    </section>

    <section id="spread" style="display:none">
      <h2>드로우 결과</h2>
      <canvas id="tarot-canvas" width="320" height="110" style="border:1px solid #3a3124;border-radius:4px;margin:4px 0"></canvas>
      <div id="cards" class="cards"></div>
      <div id="interp" class="card"></div>
      <button onclick="voiceTarot()">🎤 음성으로 듣기</button>
      <button onclick="unlockTarotPremium()">✨ 상세 리딩 (사주 연계)</button>
      <button onclick="shareTarotResult()" style="background:#3a2f22;color:#f5f1e6;border:1px solid #a38cd1;">🔮 결과 공유하기</button>
      <button onclick="shareTarotToX()" style="background:transparent;color:#a38cd1;border:1px solid #514163;font-size:0.8rem;">𝕏 로 공유</button>
      <div style="font-size:0.65rem;opacity:0.6;margin-top:4px">픽션 엔터테인먼트 • 실제 운명 아님 • 18+</div>
    </section>

    <section id="codex">
      <h2>나의 리딩 기록</h2>
      <div id="codexList"></div>
      <button onclick="showCodex()">새로고침</button>
      <button onclick="shareTarotResult()" style="background:#3a2f22;color:#f5f1e6;border:1px solid #a38cd1;margin-top:4px;">📤 최근 리딩 공유하기</button>
    </section>
  </main>

  <footer>
    <nav class="foot-nav">

  </footer>
